<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Violentómetro Web</title>
    <link rel="stylesheet" href="style.css?v=1.1">
    <script type="module" src="script.js?v=1.1"></script>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="container">
            <h1>Bienvenido al Violentómetro</h1>
            <p>Ingresa tu nombre para acceder al sistema.</p>
            <input type="text" id="username-input" placeholder="Tu nombre..." autocomplete="off">
            <button id="login-btn">Ingresar</button>
        </div>
    </div>

<div id="dashboard-screen" class="screen hidden">
        <header>
            <span id="user-display">Usuario: ...</span>
            <div>
                <button id="history-btn" class="secondary-btn" style="margin-right: 10px;">📜 Historial</button>
                <button id="logout-btn" class="secondary-btn">Salir</button>
            </div>
        </header>
        
        <div id="history-container" class="hidden" style="background: #222; padding: 15px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #444; max-height: 200px; overflow-y: auto;">
            <h3 style="margin-top: 0;">Últimos ataques</h3>
            <ul id="history-list" style="list-style: none; padding: 0; font-size: 0.9rem; color: #ccc;">
                </ul>
        </div>

        <div class="main-content">
            <h2>Usuarios Activos</h2>
            <div id="users-list" class="grid-container">
                <p class="loading-text">Cargando...</p>
            </div>
        </div>

        <div id="toast-container"></div>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
